steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/real-estate-agent:$COMMIT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/real-estate-agent:$COMMIT_SHA"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - real-estate-agent
      - --image=gcr.io/$PROJECT_ID/real-estate-agent:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
